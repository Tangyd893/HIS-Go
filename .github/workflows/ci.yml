name: HIS-Go CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  check:
    name: 代码质量检查
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum

      - name: 检查代码格式
        run: |
          fmt_output=$(gofmt -l .)
          if [ -n "$fmt_output" ]; then
            echo "以下文件格式不符合规范:"
            echo "$fmt_output"
            exit 1
          fi

      - name: 静态代码检查
        run: go vet ./...

      - name: 运行测试
        run: go test -v -race -count=1 ./...

      - name: 编译检查
        run: go build ./cmd/...
