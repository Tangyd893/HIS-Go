name: HIS-Go CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  check:
    name: 代码质量检查
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: 检查代码格式
        run: |
          fmt_output=$(gofmt -l .)
          if [ -n "$fmt_output" ]; then
            echo "以下文件格式不符合规范:"
            echo "$fmt_output"
            exit 1
          fi

      - name: 静态代码检查
        run: go vet ./...

      - name: 运行测试（含覆盖率）
        run: go test -v -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: 编译检查
        run: go build ./cmd/...

  frontend-build:
    name: 前端构建校验
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [admin, patient]
    defaults:
      run:
        working-directory: frontend/${{ matrix.app }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/${{ matrix.app }}/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 构建 ${{ matrix.app }}
        run: npm run build

      - name: 验证构建产物
        run: |
          if [ ! -d dist ]; then
            echo "构建产物目录 dist 不存在"
            exit 1
          fi
          if [ ! -f dist/index.html ]; then
            echo "index.html 不存在"
            exit 1
          fi
          echo "构建产物大小:"
          du -sh dist/

  sonarcloud:
    name: SonarCloud 代码分析
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: 运行测试（生成覆盖率）
        working-directory: backend
        run: go test -v -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: SonarCloud 扫描
        uses: SonarSource/sonarqube-scan-action@v6
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=Tangyd893_HIS-Go
            -Dsonar.organization=tangyd893

  integration-test:
    name: 集成测试 (Docker Compose)
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: 复制演示环境变量
        run: cp deploy/config/demo.env.example deploy/config/demo.env

      - name: 启动管理端演示服务
        run: |
          docker compose -f deploy/compose/demo-admin.yml \
            --env-file deploy/config/demo.env up -d --wait --wait-timeout 120

      - name: 运行集成测试（管理端）
        working-directory: testing
        env:
          HIS_INTEGRATION_TEST: "true"
          HIS_BASE_URL: http://localhost:8080
        run: go test -v -count=1 ./api/ -run "TestAdmin|TestAuth|TestGateway|TestFull|TestUserContext"

      - name: 启动患者端服务
        run: |
          docker compose -f deploy/compose/demo-patient.yml \
            --env-file deploy/config/demo.env up -d --wait --wait-timeout 60

      - name: 运行集成测试（患者端）
        working-directory: testing
        env:
          HIS_INTEGRATION_TEST: "true"
          HIS_BASE_URL: http://localhost:8080
        run: go test -v -count=1 ./api/ -run "TestPatient"

      - name: 收集容器日志（失败时）
        if: failure()
        run: |
          docker compose -f deploy/compose/demo-admin.yml logs --tail=100
          docker compose -f deploy/compose/demo-patient.yml logs --tail=100

      - name: 清理
        if: always()
        run: |
          docker compose -f deploy/compose/demo-admin.yml down -v --remove-orphans
          docker compose -f deploy/compose/demo-patient.yml down -v --remove-orphans
