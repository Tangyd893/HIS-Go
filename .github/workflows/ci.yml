name: HIS-Go CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  check:
    name: 代码质量检查
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: 检查代码格式
        run: |
          fmt_output=$(gofmt -l .)
          if [ -n "$fmt_output" ]; then
            echo "以下文件格式不符合规范:"
            echo "$fmt_output"
            exit 1
          fi

      - name: 静态代码检查
        run: go vet ./...

      - name: 运行测试（含覆盖率）
        run: go test -v -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: 编译检查
        run: go build ./cmd/...

  frontend-build:
    name: 前端构建校验
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [admin, patient]
    defaults:
      run:
        working-directory: frontend/${{ matrix.app }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/${{ matrix.app }}/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 构建 ${{ matrix.app }}
        run: npm run build

      - name: 验证构建产物
        run: |
          if [ ! -d dist ]; then
            echo "构建产物目录 dist 不存在"
            exit 1
          fi
          if [ ! -f dist/index.html ]; then
            echo "index.html 不存在"
            exit 1
          fi
          echo "构建产物大小:"
          du -sh dist/

  sonarcloud:
    name: SonarCloud 代码分析
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: 运行测试（生成覆盖率）
        working-directory: backend
        run: go test -v -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: SonarCloud 扫描
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=Tangyd893_HIS-Go
            -Dsonar.organization=tangyd893
            -Dsonar.qualitygate.wait=false
