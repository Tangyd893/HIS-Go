# HIS-Go 微服务 K8s 部署清单
# 每个微服务包含 Deployment + Service (HTTP + gRPC)

# ========== Gateway ==========
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: his
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: his-go/gateway:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RUNNING_IN_DOCKER
              value: "true"
            - name: USE_NACOS
              value: "true"
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: his-secrets, key: db-password } }
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: his-secrets, key: redis-password } }
            - name: JWT_PRIVATE_KEY
              valueFrom: { secretKeyRef: { name: his-secrets, key: jwt-private-key, optional: true } }
          ports:
            - containerPort: 8080
          resources:
            requests: { memory: "64Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "500m" }
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /ready, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: his
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
---
# ========== Auth (认证) ==========
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: his
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: his-go/auth:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: RUNNING_IN_DOCKER
              value: "true"
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: his-secrets, key: db-password } }
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: his-secrets, key: redis-password } }
            - name: JWT_PRIVATE_KEY
              valueFrom: { secretKeyRef: { name: his-secrets, key: jwt-private-key, optional: true } }
          ports:
            - { containerPort: 8081 }
            - { containerPort: 9081 }
          resources:
            requests: { memory: "64Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "500m" }
---
          livenessProbe:
            httpGet: { path: /health, port: 8081 }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /ready, port: 8081 }
            initialDelaySeconds: 5
            periodSeconds: 10
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: his
spec:
  selector: { app: auth }
  ports:
    - { name: http, port: 8081, targetPort: 8081 }
    - { name: grpc, port: 9081, targetPort: 9081 }
