apiVersion: apps/v1
kind: Deployment
metadata:
  name: nacos
  namespace: his
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
    spec:
      containers:
        - name: nacos
          image: nacos/nacos-server:v2.4.3
          env:
            - name: MODE
              value: standalone
          ports:
            - containerPort: 8848
              name: http
            - containerPort: 9848
              name: grpc
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
---
apiVersion: v1
kind: Service
metadata:
  name: nacos
  namespace: his
spec:
  selector:
    app: nacos
  ports:
    - name: http
      port: 8848
      targetPort: 8848
    - name: grpc
      port: 9848
      targetPort: 9848
