apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: his
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          resources:
            requests: { memory: "32Mi", cpu: "50m" }
            limits: { memory: "128Mi", cpu: "200m" }
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: his
data:
  default.conf: |
    upstream gateway {
        server gateway.his.svc.cluster.local:8080;
    }
    server {
        listen 80;
        server_name localhost;
        charset utf-8;
        client_max_body_size 100m;
        location /admin {
            alias /usr/share/nginx/html/admin;
            try_files $uri $uri/ /admin/index.html;
        }
        location /patient {
            alias /usr/share/nginx/html/patient;
            try_files $uri $uri/ /patient/index.html;
        }
        location = / { return 302 /admin; }
        location /api/ {
            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /health { proxy_pass http://gateway/health; }
        location /ready  { proxy_pass http://gateway/ready; }
        location /metrics { proxy_pass http://gateway/metrics; }
        location /ws/ {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: his
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: his-ingress
  namespace: his
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: his.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
