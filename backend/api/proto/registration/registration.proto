syntax = "proto3";

package registration;

option go_package = "his-go/api/proto/registration";

import "common/common.proto";

// 号源信息
message ScheduleInfo {
  string id = 1;
  string dept_id = 2;
  string dept_name = 3;
  string doctor_id = 4;
  string doctor_name = 5;
  string date = 6;
  string time_slot = 7;
  int32 total_count = 8;
  int32 remain_count = 9;
  double fee = 10;
}

// 挂号记录
message RegistrationInfo {
  string id = 1;
  string patient_id = 2;
  string patient_name = 3;
  string schedule_id = 4;
  string registration_date = 5;
  int32 queue_number = 6;
  int32 status = 7; // 0-已预约 1-已签到 2-已就诊 3-已取消
  string created_at = 8;
}

// 号源查询请求
message ScheduleQueryRequest {
  string dept_id = 1;
  string date = 2;
}

// 挂号请求
message RegistrationRequest {
  string patient_id = 1;
  string schedule_id = 2;
}

// 排队状态
message QueueStatus {
  string registration_id = 1;
  int32 queue_number = 2;
  int32 current_number = 3;
  int32 wait_count = 4;
  string status = 5;
}

// 挂号服务
service RegistrationService {
  rpc ListSchedules(ScheduleQueryRequest) returns (ScheduleListResponse);
  rpc Register(RegistrationRequest) returns (RegistrationInfo);
  rpc CancelRegistration(common.IdRequest) returns (common.BaseResponse);
  rpc SignIn(common.IdRequest) returns (common.BaseResponse);
  rpc GetQueueStatus(common.IdRequest) returns (QueueStatus);
  rpc CallNext(common.IdRequest) returns (RegistrationInfo);
}

message ScheduleListResponse {
  common.BaseResponse base = 1;
  repeated ScheduleInfo schedules = 2;
}
