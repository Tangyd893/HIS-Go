syntax = "proto3";

package outpatient;

option go_package = "his-go/api/proto/outpatient";

import "common/common.proto";

// 在线问诊
message Consultation {
  string id = 1;
  string patient_id = 2;
  string doctor_id = 3;
  int32 type = 4; // 1-图文 2-视频
  string description = 5;
  repeated string images = 6;
  repeated ConsultationMessage messages = 7;
  int32 status = 8;
  string created_at = 9;
}

// 问诊消息
message ConsultationMessage {
  string id = 1;
  string consultation_id = 2;
  string sender_id = 3;
  string sender_name = 4;
  string content = 5;
  string msg_type = 6;
  string created_at = 7;
}

// 慢病签约
message ChronicContract {
  string id = 1;
  string patient_id = 2;
  string doctor_id = 3;
  string disease_type = 4;
  string contract_date = 5;
  string end_date = 6;
  int32 status = 7;
}

// 健康数据
message HealthData {
  string id = 1;
  string patient_id = 2;
  string data_type = 3; // blood_pressure, blood_sugar, weight
  string value = 4;
  string unit = 5;
  string measure_time = 6;
  bool abnormal = 7;
}

// 院外服务
service OutpatientService {
  rpc CreateConsultation(Consultation) returns (Consultation);
  rpc GetConsultation(common.IdRequest) returns (Consultation);
  rpc SendMessage(ConsultationMessage) returns (ConsultationMessage);
  rpc CreateChronicContract(ChronicContract) returns (ChronicContract);
  rpc ReportHealthData(HealthData) returns (HealthData);
  rpc ListConsultations(ConsultationListRequest) returns (ConsultationListResponse);
}

message ConsultationListRequest {
  common.PageRequest page = 1;
  string patient_id = 2;
  string doctor_id = 3;
  int32 status = 4;
}

message ConsultationListResponse {
  common.BaseResponse base = 1;
  repeated Consultation consultations = 2;
  common.PageResponse page = 3;
}
