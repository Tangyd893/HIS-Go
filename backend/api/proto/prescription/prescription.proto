syntax = "proto3";

package prescription;

option go_package = "his-go/api/proto/prescription";

import "common/common.proto";

// 处方信息
message PrescriptionInfo {
  string id = 1;
  string patient_id = 2;
  string patient_name = 3;
  string doctor_id = 4;
  string diagnosis_id = 5;
  int32 prescription_type = 6; // 1-西药 2-中成药 3-中草药
  int32 status = 7; // 0-草稿 1-待审核 2-已审核 3-已收费 4-已发药
  repeated PrescriptionDetail details = 8;
  string note = 9;
  string created_at = 10;
}

// 处方明细
message PrescriptionDetail {
  string id = 1;
  string prescription_id = 2;
  string drug_id = 3;
  string drug_name = 4;
  string specification = 5;
  double dosage = 6;
  string usage = 7;
  string frequency = 8;
  int32 days = 9;
  int32 quantity = 10;
  double unit_price = 11;
  string note = 12;
}

// 处方列表请求
message PrescriptionListRequest {
  common.PageRequest page = 1;
  string patient_id = 2;
  string doctor_id = 3;
  int32 status = 4;
}

// 处方服务
service PrescriptionService {
  rpc CreatePrescription(PrescriptionInfo) returns (PrescriptionInfo);
  rpc GetPrescription(common.IdRequest) returns (PrescriptionInfo);
  rpc ListPrescriptions(PrescriptionListRequest) returns (PrescriptionListResponse);
  rpc ReviewPrescription(ReviewRequest) returns (PrescriptionInfo);
  rpc CancelPrescription(common.IdRequest) returns (common.BaseResponse);
}

message ReviewRequest {
  string prescription_id = 1;
  bool approved = 2;
  string comment = 3;
}

message PrescriptionListResponse {
  common.BaseResponse base = 1;
  repeated PrescriptionInfo prescriptions = 2;
  common.PageResponse page = 3;
}
