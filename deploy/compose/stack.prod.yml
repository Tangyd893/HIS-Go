services:
  # ========== Infrastructure ==========
  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: his-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_IDENTITY_KEY: his
      NACOS_AUTH_IDENTITY_VALUE: his
      NACOS_AUTH_TOKEN_EXPIRE_SECONDS: 18000
    volumes:
      - nacos_data:/home/nacos/data
    ports:
      - "8848:8848"
      - "9848:9848"
    networks:
      - his-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgresql:
    image: postgres:17-alpine
    container_name: his-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-his_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_123}
      POSTGRES_DB: his_auth
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - his-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-his_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: his-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me_456} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - his-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: his-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${MQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${MQ_PASSWORD:-change_me_789}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - his-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: his-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-change_me_012}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - his-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========== DB Init ==========
  db-init:
    image: postgres:17-alpine
    container_name: his-db-init
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD:-change_me_123}
    volumes:
      - ../../backend/sql/init_all.sql:/init_all.sql:ro
      - ../../backend/sql/seed_data.sql:/seed_data.sql:ro
      - ./init-db.sh:/init-db.sh:ro
    entrypoint: ["/bin/sh", "/init-db.sh"]
    networks:
      - his-net

  # ========== Vue Frontend构建 ==========
  build-admin:
    build:
      context: ../../frontend/admin
      dockerfile: Dockerfile
    image: his-go/admin:latest
    volumes:
      - admin_dist:/app/dist
    entrypoint: ["/bin/sh", "-c", "cp -r /app/dist/* /dist_target/ 2>/dev/null; echo done"]
    networks:
      - his-net

  build-patient:
    build:
      context: ../../frontend/patient
      dockerfile: Dockerfile
    image: his-go/patient:latest
    volumes:
      - patient_dist:/app/dist
    entrypoint: ["/bin/sh", "-c", "cp -r /app/dist/* /dist_target/ 2>/dev/null; echo done"]
    networks:
      - his-net

  # ========== Nginx Reverse Proxy ==========
  nginx:
    image: nginx:alpine
    container_name: his-nginx
    depends_on:
      - gateway
      - build-admin
      - build-patient
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - admin_dist:/usr/share/nginx/html/admin:ro
      - patient_dist:/usr/share/nginx/html/patient:ro
    ports:
      - "80:80"
    networks:
      - his-net
    restart: unless-stopped

  # ===
  gateway:
    build:
      context: ../../backend
      dockerfile: ../Dockerfile
      args:
        SERVICE_NAME: gateway
    image: his-go/gateway:latest
    container_name: his-gateway
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RUNNING_IN_DOCKER: "true"
      DB_HOST: postgresql
      DB_PASSWORD: ${DB_PASSWORD:-change_me_123}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me_456}
      MQ_HOST: rabbitmq
      MQ_PASSWORD: ${MQ_PASSWORD:-change_me_789}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    ports:
      - "8080:8080"
    networks:
      - his-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  auth:
    build:
      context: ../../backend
      dockerfile: ../Dockerfile
      args:
        SERVICE_NAME: auth
    image: his-go/auth:latest
    container_name: his-auth
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RUNNING_IN_DOCKER: "true"
      DB_HOST: postgresql
      DB_PASSWORD: ${DB_PASSWORD:-change_me_123}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me_456}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    ports:
      - "8081:8081"
      - "9081:9081"
    networks:
      - his-net
    restart: unless-stopped

networks:
  his-net:
    driver: bridge

volumes:
  nacos_data:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  admin_dist:
  patient_dist:
