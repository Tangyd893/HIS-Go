# HIS-Go Patient Demo Profile
# Usage: docker compose -f demo-patient.yml up -d
# Includes: PostgreSQL + Redis + Gateway + patient services + Nginx (no RabbitMQ)

services:
  # ========== Infrastructure ==========
  postgresql:
    image: postgres:17-alpine
    container_name: his-postgres-demo
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-his_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_123}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../backend/migrations:/docker-entrypoint-initdb.d
      - ../../backend/sql:/sql-init
    networks:
      - his-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-his_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 自动初始化 seed 数据
  db-init:
    image: postgres:17-alpine
    container_name: his-db-init
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-change_me_123}
    volumes:
      - ../../backend/sql:/sql-init:ro
    entrypoint: ["bash", "-c", "echo '=== Running seed data ===' && for f in /sql-init/seed_data.sql /sql-init/seed_data_extended.sql; do echo \"Running $$f...\"; psql -h postgresql -U ${POSTGRES_USER:-his_admin} -f \"$$f\" -v ON_ERROR_STOP=0 || echo \"(some inserts already exist, continuing)\"; done && echo '=== Seed complete ==='"]
    networks:
      - his-net
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: his-redis-demo
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me_456} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - his-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me_456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== Go Microservices (Patient Profile) ==========
  his-gateway:
    build:
      context: ../../backend
      dockerfile: ../deploy/Dockerfile
      args:
        SERVICE_NAME: gateway
    image: his-go/gateway:latest
    container_name: his-gateway-demo
    ports:
      - "8080:8080"
    environment:
      - RUNNING_IN_DOCKER=true
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY:-}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-auth:
    build:
      context: ../../backend
      dockerfile: ../deploy/Dockerfile
      args:
        SERVICE_NAME: auth
    image: his-go/auth:latest
    container_name: his-auth-demo
    ports:
      - "8081:8081"
      - "9081:9081"
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY:-}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY:-}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-user:
    build:
      context: ../../backend
      dockerfile: ../deploy/Dockerfile
      args:
        SERVICE_NAME: user
    image: his-go/user:latest
    container_name: his-user-demo
    ports:
      - "8082:8082"
      - "9082:9082"
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-registration:
    build:
      context: ../../backend
      dockerfile: ../deploy/Dockerfile
      args:
        SERVICE_NAME: registration
    image: his-go/registration:latest
    container_name: his-registration-demo
    ports:
      - "8083:8083"
      - "9083:9083"
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-schedule:
    build:
      context: ../../backend
      dockerfile: ../deploy/Dockerfile
      args:
        SERVICE_NAME: schedule
    image: his-go/schedule:latest
    container_name: his-schedule-demo
    ports:
      - "8090:8090"
      - "9090:9090"
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-prescription:
    build:
      context: ../../backend
      dockerfile: ../deploy/Dockerfile
      args:
        SERVICE_NAME: prescription
    image: his-go/prescription:latest
    container_name: his-prescription-demo
    ports:
      - "8085:8085"
      - "9085:9085"
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-examination:
    build:
      context: ../../backend
      dockerfile: ../deploy/Dockerfile
      args:
        SERVICE_NAME: examination
    image: his-go/examination:latest
    container_name: his-examination-demo
    ports:
      - "8088:8088"
      - "9088:9088"
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-followup:
    build:
      context: ../../backend
      dockerfile: ../deploy/Dockerfile
      args:
        SERVICE_NAME: followup
    image: his-go/followup:latest
    container_name: his-followup-demo
    ports:
      - "8092:8092"
      - "9092:9092"
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-health-record:
    build:
      context: ../../backend
      dockerfile: ../deploy/Dockerfile
      args:
        SERVICE_NAME: health_record
    image: his-go/health-record:latest
    container_name: his-health-record-demo
    ports:
      - "8093:8093"
      - "9093:9093"
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-outpatient:
    build:
      context: ../../backend
      dockerfile: ../deploy/Dockerfile
      args:
        SERVICE_NAME: outpatient
    image: his-go/outpatient:latest
    container_name: his-outpatient-demo
    ports:
      - "8091:8091"
      - "9091:9091"
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY:-}
      - SILICONFLOW_EMBED_MODEL=${SILICONFLOW_EMBED_MODEL:-BAAI/bge-m3}
      - TRIAGE_RAG_ENABLED=${TRIAGE_RAG_ENABLED:-false}
      - TRIAGE_TOP_K=${TRIAGE_TOP_K:-5}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      his-user:
        condition: service_started
    networks:
      - his-net
    restart: unless-stopped

  # ========== Nginx Reverse Proxy + Vue Frontend ==========
  nginx:
    image: nginx:alpine
    container_name: his-nginx-demo
    depends_on:
      - his-gateway
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../frontend/admin/dist:/usr/share/nginx/html/admin:ro
      - ../../frontend/patient/dist:/usr/share/nginx/html/patient:ro
    ports:
      - "80:80"
    networks:
      - his-net
    restart: unless-stopped

networks:
  his-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
