# HIS-Go Admin Demo Profile
# Usage: docker compose -f demo-admin.yml up -d
# Includes: PostgreSQL + Redis + RabbitMQ + Gateway + admin services + Nginx

services:
  # ========== Infrastructure ==========
  postgresql:
    image: postgres:17-alpine
    container_name: his-postgres-demo
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-his_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_123}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../backend/migrations:/docker-entrypoint-initdb.d
      - ../../backend/sql:/sql-init
    networks:
      - his-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-his_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 自动初始化 seed 数据（首次启动或数据库为空时执行）
  db-init:
    image: postgres:17-alpine
    container_name: his-db-init
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-change_me_123}
    volumes:
      - ../../backend/sql:/sql-init:ro
    entrypoint: ["bash", "-c", "echo '=== Running seed data ===' && for f in /sql-init/seed_data.sql /sql-init/seed_data_extended.sql /sql-init/seed_admin_sync.sql; do echo \"Running $$f...\"; psql -h postgresql -U ${POSTGRES_USER:-his_admin} -f \"$$f\" -v ON_ERROR_STOP=0 || echo \"(some inserts already exist, continuing)\"; done && echo '=== Seed complete ==='"]
    networks:
      - his-net
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: his-redis-demo
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me_456} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - his-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me_456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: his-rabbitmq-demo
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change_me_789}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - his-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ========== Go Microservices (Admin Profile) ==========
  his-gateway:
    build:
      context: ../../backend
      dockerfile: ../deploy/Dockerfile
      args:
        SERVICE_NAME: gateway
    image: his-go/gateway:latest
    container_name: his-gateway-demo
    ports:
      - "8080:8080"
    environment:
      - RUNNING_IN_DOCKER=true
      - HIS_DEMO_MODE=true
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY:-}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-auth:
    build:
      context: ../../backend
      dockerfile: ../deploy/Dockerfile
      args:
        SERVICE_NAME: auth
    image: his-go/auth:latest
    container_name: his-auth-demo
    ports:
      - "8081:8081"
      - "9081:9081"
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
      - MQ_HOST=rabbitmq
      - MQ_PASSWORD=${RABBITMQ_PASSWORD:-change_me_789}
      - HIS_DEMO_MODE=true
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY:-}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY:-}
    depends_on:
