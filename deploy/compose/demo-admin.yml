# HIS-Go Admin Demo Profile
# Usage: docker compose -f demo-admin.yml up -d
# Includes: PostgreSQL + Redis + RabbitMQ + Gateway + admin services + Nginx

services:
  # ========== Infrastructure ==========
  postgresql:
    image: postgres:17-alpine
    container_name: his-postgres-demo
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-his_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_123}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../backend/migrations:/docker-entrypoint-initdb.d
      - ../../backend/sql:/sql-init
    networks:
      - his-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-his_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: his-redis-demo
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me_456} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - his-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me_456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: his-rabbitmq-demo
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change_me_789}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - his-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ========== Go Microservices (Admin Profile) ==========
  his-gateway:
    build:
      context: ../../backend
      dockerfile: ../Dockerfile
      args:
        SERVICE_NAME: gateway
    image: his-go/gateway:latest
    container_name: his-gateway-demo
    ports:
      - "8080:8080"
    environment:
      - RUNNING_IN_DOCKER=true
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY:-}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-auth:
    build:
      context: ../../backend
      dockerfile: ../Dockerfile
      args:
        SERVICE_NAME: auth
    image: his-go/auth:latest
    container_name: his-auth-demo
    ports:
      - "8081:8081"
      - "9081:9081"
    environment:
      - DB_HOST=postgresql
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
      - MQ_HOST=rabbitmq
      - MQ_PASSWORD=${RABBITMQ_PASSWORD:-change_me_789}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY:-}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY:-}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-user:
    build:
      context: ../../backend
      dockerfile: ../Dockerfile
      args:
        SERVICE_NAME: user
    image: his-go/user:latest
    container_name: his-user-demo
    ports:
      - "8082:8082"
      - "9082:9082"
    environment:
      - DB_HOST=postgresql
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
      - MQ_HOST=rabbitmq
      - MQ_PASSWORD=${RABBITMQ_PASSWORD:-change_me_789}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-registration:
    build:
      context: ../../backend
      dockerfile: ../Dockerfile
      args:
        SERVICE_NAME: registration
    image: his-go/registration:latest
    container_name: his-registration-demo
    ports:
      - "8083:8083"
      - "9083:9083"
    environment:
      - DB_HOST=postgresql
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
      - MQ_HOST=rabbitmq
      - MQ_PASSWORD=${RABBITMQ_PASSWORD:-change_me_789}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-clinic:
    build:
      context: ../../backend
      dockerfile: ../Dockerfile
      args:
        SERVICE_NAME: clinic
    image: his-go/clinic:latest
    container_name: his-clinic-demo
    ports:
      - "8084:8084"
      - "9084:9084"
    environment:
      - DB_HOST=postgresql
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
      - MQ_HOST=rabbitmq
      - MQ_PASSWORD=${RABBITMQ_PASSWORD:-change_me_789}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-prescription:
    build:
      context: ../../backend
      dockerfile: ../Dockerfile
      args:
        SERVICE_NAME: prescription
    image: his-go/prescription:latest
    container_name: his-prescription-demo
    ports:
      - "8085:8085"
      - "9085:9085"
    environment:
      - DB_HOST=postgresql
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
      - MQ_HOST=rabbitmq
      - MQ_PASSWORD=${RABBITMQ_PASSWORD:-change_me_789}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-billing:
    build:
      context: ../../backend
      dockerfile: ../Dockerfile
      args:
        SERVICE_NAME: billing
    image: his-go/billing:latest
    container_name: his-billing-demo
    ports:
      - "8086:8086"
      - "9086:9086"
    environment:
      - DB_HOST=postgresql
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
      - MQ_HOST=rabbitmq
      - MQ_PASSWORD=${RABBITMQ_PASSWORD:-change_me_789}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-pharmacy:
    build:
      context: ../../backend
      dockerfile: ../Dockerfile
      args:
        SERVICE_NAME: pharmacy
    image: his-go/pharmacy:latest
    container_name: his-pharmacy-demo
    ports:
      - "8087:8087"
      - "9087:9087"
    environment:
      - DB_HOST=postgresql
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
      - MQ_HOST=rabbitmq
      - MQ_PASSWORD=${RABBITMQ_PASSWORD:-change_me_789}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-schedule:
    build:
      context: ../../backend
      dockerfile: ../Dockerfile
      args:
        SERVICE_NAME: schedule
    image: his-go/schedule:latest
    container_name: his-schedule-demo
    ports:
      - "8090:8090"
      - "9090:9090"
    environment:
      - DB_HOST=postgresql
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
      - MQ_HOST=rabbitmq
      - MQ_PASSWORD=${RABBITMQ_PASSWORD:-change_me_789}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-system:
    build:
      context: ../../backend
      dockerfile: ../Dockerfile
      args:
        SERVICE_NAME: system
    image: his-go/system:latest
    container_name: his-system-demo
    ports:
      - "8096:8096"
      - "9096:9096"
    environment:
      - DB_HOST=postgresql
      - DB_PASSWORD=${POSTGRES_PASSWORD:-change_me_123}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_456}
      - MQ_HOST=rabbitmq
      - MQ_PASSWORD=${RABBITMQ_PASSWORD:-change_me_789}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  # ========== Nginx Reverse Proxy + Vue Frontend ==========
  nginx:
    image: nginx:alpine
    container_name: his-nginx-demo
    depends_on:
      - his-gateway
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../frontend/admin/dist:/usr/share/nginx/html/admin:ro
      - ../../frontend/patient/dist:/usr/share/nginx/html/patient:ro
    ports:
      - "80:80"
    networks:
      - his-net
    restart: unless-stopped

networks:
  his-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
