upstream gateway {
    server his-gateway:8080;
}

server {
    listen 80;
    server_name localhost;
    charset utf-8;
    client_max_body_size 100m;

    # ========== 管理端 (frontend/admin) ==========
    location /admin {
        alias /usr/share/nginx/html/admin;
        try_files $uri $uri/ /admin/index.html;
        index index.html;
    }

    # ========== 患者端 (frontend/patient) ==========
    location /patient {
        alias /usr/share/nginx/html/patient;
        try_files $uri $uri/ /patient/index.html;
        index index.html;
    }

    # ========== 根路径重定向到管理端 ==========
    location = / {
        return 302 /admin;
    }

    # ========== API 反向代理 ==========
    location /api/ {
        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ========== 健康检查 ==========
    location /health {
        proxy_pass http://gateway/health;
        proxy_set_header Host $host;
    }

    location /ready {
        proxy_pass http://gateway/ready;
        proxy_set_header Host $host;
    }

    location /metrics {
        proxy_pass http://gateway/metrics;
        proxy_set_header Host $host;
    }

    # ========== WebSocket 支持 ==========
    location /ws/ {
        proxy_pass http://gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # ========== 静态资源缓存 ==========
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
