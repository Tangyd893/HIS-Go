# SonarCloud 项目配置
# Project Key: Tangyd893_HIS-Go
# Organization: tangyd893
# URL: https://sonarcloud.io/project/overview?id=Tangyd893_HIS-Go

sonar.organization=tangyd893
sonar.projectKey=Tangyd893_HIS-Go
sonar.projectName=HIS-Go
sonar.projectVersion=0.2.0

# 源码路径
sonar.sources=backend
sonar.exclusions=backend/vendor/**,backend/bin/**,backend/**/*_test.go,backend/api/proto/**

# Go 测试与覆盖率
sonar.go.coverage.reportPaths=backend/coverage.out
sonar.go.tests.reportPaths=backend/test-report.xml

# 源码编码
sonar.sourceEncoding=UTF-8

# 前端（暂不分析，后续可添加）
# sonar.sources=frontend/admin/src,frontend/patient/src
# sonar.exclusions=frontend/**/node_modules/**,frontend/**/dist/**,frontend/archive/**

# 排除二进制与生成文件
sonar.exclusions=**/*.pb.go,**/*_gen.go,**/*.vue.js,**/*.js.map
