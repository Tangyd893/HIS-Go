version: '3.8'

services:
  # ========== 基础设施 ==========
  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: his-nacos
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=false
    ports:
      - "8848:8848"
      - "9848:9848"
    networks:
      - his-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgresql:
    image: postgres:17-alpine
    container_name: his-postgres
    environment:
      POSTGRES_USER: his_admin
      POSTGRES_PASSWORD: change_me_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/sql:/docker-entrypoint-initdb.d
    networks:
      - his-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U his_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: his-redis
    command: redis-server --requirepass change_me_456 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - his-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "change_me_456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: his-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: change_me_789
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - his-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: his-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: change_me_012
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - his-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ========== Go 微服务 ==========
  his-gateway:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
      args:
        SERVICE_NAME: gateway
    image: his-go/gateway:latest
    container_name: his-gateway
    ports:
      - "8080:8080"
    environment:
      - RUNNING_IN_DOCKER=true
      - DB_HOST=postgresql
      - REDIS_HOST=redis
      - MQ_HOST=rabbitmq
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-auth:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
      args:
        SERVICE_NAME: auth
    image: his-go/auth:latest
    container_name: his-auth
    ports:
      - "8081:8081"
      - "9081:9081"
    environment:
      - DB_HOST=postgresql
      - REDIS_HOST=redis
      - MQ_HOST=rabbitmq
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - his-net
    restart: unless-stopped

  his-user:
